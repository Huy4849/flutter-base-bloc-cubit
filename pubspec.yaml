name: bnv_opendata
description: A new Flutter project.

# The following line prevents the package from being accidentally published to
# pub.dev using `pub publish`. This is preferred for private packages.
publish_to: "none" # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Dart
  dartx: ^1.2.0
  auto_size_text: 3.0.0

  #Favourite library
  provider: ^6.1.5+1
  flutter_bloc: ^9.1.1
  google_fonts: ^8.1.0
  url_launcher: ^6.3.2
  path_provider: ^2.1.5
  webview_flutter: ^4.13.1
  shared_preferences: ^2.5.5
  font_awesome_flutter: ^11.0.0
  lint: ^2.8.0
  table_calendar: ^3.1.3
  image_picker: ^1.0.8
  flutter_svg: ^2.3.0

  #Library helpful
  carousel_slider: ^5.0.0
  intl: ^0.20.2
  event_bus: ^2.0.1
  equatable: ^2.0.8
  fluttertoast: ^8.2.14
  json_annotation: ^4.12.0
  flutter_screenutil: ^5.9.3
  cached_network_image: ^3.4.1
  smooth_page_indicator: ^2.0.1
  flutter_staggered_grid_view: ^0.7.0
  rxdart: ^0.28.0
  get: ^4.7.3
  injectable: ^3.0.0
  freezed: ^3.2.5
  connectivity_plus: ^7.1.1
  retrofit: ^4.0.0
  logger: any #for logging purpose
  logging: ^1.3.0
  pretty_dio_logger: ^1.2.0-beta-1

  # Library support for app
  crypto: ^3.0.7
  sqflite: ^2.3.3
  mat_month_picker_dialog: ^1.1.3
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  retrofit_generator: ^10.0.0
  build_runner: #flutter pub run build_runner build --delete-conflicting-outputs
  json_serializable: ">4.4.0"
  injectable_generator: ^3.0.2
  intl_utils: ^2.8.7

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/font/
  fonts:
    - family: NunitoSans
      fonts:
        - asset: assets/font/nunitosansregular.ttf
        - asset: assets/font/nunitosansblack.ttf
          weight: 900
        - asset: assets/font/nunitosansbold.ttf
          weight: 800
        - asset: assets/font/nunitosanssemibold.ttf
          weight: 700

flutter_intl:
  enabled: true
